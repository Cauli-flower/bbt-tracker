<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#e7889b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="体温计" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <link rel="manifest" href="manifest.json" />
  <title>体温计</title>
  <link rel="stylesheet" href="app.css" />
</head>
<body>
  <header class="app-header">
    <h1 id="view-title">今日记录</h1>
    <div id="header-sub" class="header-sub"></div>
  </header>

  <main id="app" class="app-main"><!-- 各页面渲染到这里 --></main>

  <nav class="tabbar">
    <button class="tab" data-view="record"><span class="tab-ico" data-icon="pencil"></span><span>记录</span></button>
    <button class="tab" data-view="chart"><span class="tab-ico" data-icon="chart"></span><span>曲线</span></button>
    <button class="tab" data-view="calendar"><span class="tab-ico" data-icon="calendar"></span><span>日历</span></button>
    <button class="tab" data-view="settings"><span class="tab-ico" data-icon="settings"></span><span>设置</span></button>
  </nav>

  <script src="js/store.js"></script>
  <script src="js/cycle.js"></script>
  <script src="js/icons.js"></script>
  <script src="js/chart.js"></script>
  <script src="js/views.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
